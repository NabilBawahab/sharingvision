services:
  mysql:
    image: mysql:8.0
    container_name: sharingvision-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: sharingvision
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_pass
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot_password --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
